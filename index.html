<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pointless Commute Calculator</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: #f8fafc;
    }
    .card {
      width: min(600px, 92vw);
      background: rgba(15, 23, 42, 0.96);
      border-radius: 24px;
      padding: 32px;
    }
    h1 {
      margin-top: 0;
      font-size: 2.4rem;
    }
    .highlight {
      color: #38bdf8;
      font-weight: bold;
    }
    .breakdown {
      background: rgba(71, 85, 105, 0.2);
      padding: 1rem;
      border-radius: 12px;
      margin: 1rem 0;
    }
    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      background: linear-gradient(90deg, #60a5fa, #38bdf8);
      padding: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    input {
      width: 100%;
      padding: 0.8rem;
      margin: 0.5rem 0 1rem;
      border-radius: 10px;
      border: none;
    }
    .result {
      margin-top: 1.5rem;
      padding: 1rem;
      background: rgba(71, 85, 105, 0.2);
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>This is my pointless commute</h1>

    <p>Every commute day looks like this:</p>

    <div class="breakdown">
      🚗 15 min drive to station<br>
      🚆 15 min first train<br>
      ⏳ 15 min waiting around<br>
      🚆 1h 20m second train<br>
      🚶 15 min walk to office<br><br>
      <strong>…and then I do it all again to get home.</strong>
    </div>

    <p>
      That’s <span class="highlight">3h 40m per day</span> of life gone.
    </p>

    <button onclick="calculate()">Show me how much time I've wasted</button>

    <div class="result" id="result"></div>

    <hr style="margin:2rem 0; opacity:0.2;">

    <h2>Work out your own pointless commute</h2>

    <label>Hours per day</label>
    <input id="hours" type="time" value="03:40">

    <label>Days per week</label>
    <input id="days" type="number" value="2">

    <button onclick="customCalc()">Calculate yours</button>

    <div class="result" id="customResult"></div>
  </main>

  <script>
    function format(mins) {
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return `${h}h ${m}m`;
    }

    function calculate() {
      const daily = 220; // 3h 40m
      const weekly = daily * 2;
      const yearly = weekly * 52;

      document.getElementById('result').innerHTML = `
        <p><strong>Per week:</strong> ${format(weekly)}</p>
        <p><strong>Per year:</strong> ${format(yearly)}</p>
        <p class="highlight">That’s ${Math.round(yearly / 60 / 24)} full days of your life every year.</p>
      `;
    }

    function customCalc() {
      const [h, m] = document.getElementById('hours').value.split(':').map(Number);
      const days = Number(document.getElementById('days').value);

      const daily = h * 60 + m;
      const weekly = daily * days;
      const yearly = weekly * 52;

      document.getElementById('customResult').innerHTML = `
        <p><strong>Weekly:</strong> ${format(weekly)}</p>
        <p><strong>Yearly:</strong> ${format(yearly)}</p>
        <p class="highlight">${Math.round(yearly / 60 / 24)} days of your life per year.</p>
      `;
    }

    window.onload = calculate;
  </script>
</body>
</html>
